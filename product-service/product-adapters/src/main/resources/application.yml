spring:
  application:
    name: ${env.SERVICE_NAME:product-service}
  jackson:
    time-zone: Asia/Seoul

  jwt:
    secret: ${JWT_SECRET_KEY:dev-secret-change-me}
    admin-access-token: ${JWT_ADMIN_ACCESS_TOKEN:abc}

  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DB_URL:jdbc:postgresql://localhost:5432/marketnote_product}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    hikari:
      maximum-pool-size: 2
      minimum-idle: 1
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false

  sql:
    init:
      mode: always
      schema-locations: classpath:org/springframework/batch/core/schema-postgresql.sql
      continue-on-error: true

  data:
    redis:
      host: ${REDIS_HOST_NAME:localhost}
      port: 6379
      password: ${REDIS_PASSWORD:password}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    sasl:
      enabled: ${KAFKA_SASL_ENABLED:false}
      mechanism: ${KAFKA_SASL_MECHANISM:SCRAM-SHA-256}
      protocol: ${KAFKA_SASL_PROTOCOL:SASL_PLAINTEXT}
      username: ${KAFKA_SASL_USERNAME:}
      password: ${KAFKA_SASL_PASSWORD:}
    consumer:
      group-id: ${spring.application.name}

client:
  origin: ${CLIENT_ORIGIN:http://localhost:3000}
  cookie-domain: ${COOKIE_DOMAIN:localhost}
  cors:
    allowed-origins: ${ACCESS_CONTROL_ALLOWED_ORIGINS:http://localhost:3000}

server:
  origin: ${SERVER_ORIGIN:http://localhost:8081}
  error:
    include-exception: false
    include-stacktrace: NEVER
    whitelabel:
      enabled: false

logging:
  config: classpath:logback-spring.xml
  level:
    org.springframework.security: ERROR

file-service:
  base-url: ${FILE_SERVICE_SERVER_ORIGIN:http://localhost:9000}

commerce-service:
  base-url: ${COMMERCE_SERVICE_SERVER_ORIGIN:http://localhost:8082}

community-service:
  base-url: ${COMMUNITY_SERVICE_SERVER_ORIGIN:http://localhost:8083}

fulfillment-service:
  base-url: ${FULFILLMENT_SERVICE_SERVER_ORIGIN:http://localhost:8085}
  fassto:
    customer-code: ${FASSTO_CUSTOMER_CODE:change-me}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
