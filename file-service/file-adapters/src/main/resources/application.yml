spring:
  application:
    name: ${env.SERVICE_NAME:file-service}
  jackson:
    time-zone: Asia/Seoul
  servlet:
    multipart:
      enabled: true
      max-request-size: 10MB
      max-file-size: 10MB

  jwt:
    secret: ${JWT_SECRET_KEY:dev-secret-change-me}
    admin-access-token: ${JWT_ADMIN_ACCESS_TOKEN:abc}

  hmac:
    secret-key: ${HMAC_SECRET_KEY:dev-hmac-secret-change-me}

  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DB_URL:jdbc:postgresql://localhost:5432/marketnote_file}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    hikari:
      maximum-pool-size: 2
      minimum-idle: 1
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false

  sql:
    init:
      mode: always
      schema-locations: classpath:org/springframework/batch/core/schema-postgresql.sql
      continue-on-error: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    sasl:
      enabled: ${KAFKA_SASL_ENABLED:false}
      mechanism: ${KAFKA_SASL_MECHANISM:SCRAM-SHA-256}
      protocol: ${KAFKA_SASL_PROTOCOL:SASL_PLAINTEXT}
      username: ${KAFKA_SASL_USERNAME:}
      password: ${KAFKA_SASL_PASSWORD:}
    consumer:
      group-id: ${spring.application.name}

client:
  origin: ${CLIENT_ORIGIN:http://localhost:3000}
  cookie-domain: ${COOKIE_DOMAIN:localhost}
  cors:
    allowed-origins: ${ACCESS_CONTROL_ALLOWED_ORIGINS:http://localhost:3000}

server:
  origin: ${SERVER_ORIGIN:http://localhost:9000}
  error:
    include-exception: false
    include-stacktrace: NEVER
    include-message: NEVER
    whitelabel:
      enabled: false

logging:
  config: classpath:logback-spring.xml
  level:
    org.springframework.security: ERROR

kafka:
  slack:
    webhook-url: ${KAFKA_SLACK_WEBHOOK_URL:}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

file:
  s3:
    credentials:
      access-key: ${S3_ACCESS_KEY:abc}
      secret-key: ${S3_SECRET_KEY:def}
    region:
      static: ${S3_REGION:ap-northeast-2}
    bucket-name: ${S3_BUCKET_NAME:ghi}
